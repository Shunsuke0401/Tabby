<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tabby — Enable Microphone</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 480px; margin: 64px auto; padding: 0 24px; color: #1f2933; line-height: 1.5; }
    h1 { font-size: 22px; }
    button { font-size: 15px; padding: 10px 18px; border: none; border-radius: 8px;
      background: #4a90e2; color: #fff; cursor: pointer; }
    button:hover { filter: brightness(0.95); }
    #status { margin-top: 16px; font-size: 14px; }
    .ok { color: #127a3b; }
    .err { color: #b00020; }
    .hint { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <h1>🎙️ Enable Tabby’s microphone</h1>
  <p>Tabby talks with you by voice, so it needs microphone access. Click below and choose <b>Allow</b> in Chrome’s prompt.</p>
  <button id="grant">Enable microphone</button>
  <p id="status"></p>
  <p class="hint">After allowing, you can close this tab and click <b>🎙️ Talk to Tabby</b> in the side panel.</p>
  <script type="module" src="src/mic-permission.js"></script>
</body>
</html>
