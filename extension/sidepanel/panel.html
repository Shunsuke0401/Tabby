<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <!-- ───────── IDLE (start) VIEW — minimal: start button + mic selector ───────── -->
    <div id="idleView">
      <header>
        <div class="brand"><h1>Tabby</h1><span id="count">— tabs</span></div>
        <button id="micBtn" class="icon-btn" title="Choose microphone" aria-label="Choose microphone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
      </header>

      <div id="micMenu" class="mic-menu" hidden>
        <label for="micPicker">Microphone</label>
        <select id="micPicker"></select>
      </div>

      <div class="idle-center">
        <p class="idle-tagline">Your tabs, handled by voice.</p>
        <button id="startBtn" class="start-btn">🎙️ Start Tabby</button>
        <p class="idle-hint">Tap to talk — then just say what you want: clean up, close a tab, or bring one back.</p>
      </div>
    </div>

    <!-- ───────── ACTIVE VIEW (immersive loader — the main screen) ───────── -->
    <div id="activeView" hidden>
      <button id="endBtn" class="end-btn" title="End session" aria-label="End session">✕</button>
      <div class="loader">
        <div class="loader__word" id="statusWord" aria-live="polite"></div>
        <div class="loader__ring"></div>
      </div>
      <div id="activeTranscript"></div>
    </div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
